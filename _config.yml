# UI configs
title: "Nomad in Pics"
subtitle: "Travel, landscape & lifestyle photography"
description: "Fotógrafo en Córdoba especializado en viajes, paisajes, interiores y eventos. Más de 50 países recorridos. Colaboraciones con marcas, municipios y empresas de turismo. Por Álvaro C. A."
author: "Álvaro C. A."
header:
  title: "Nomad in Pics"
  subtitle: "by Álvaro C. A."
footer:
  name: "Sobre mí"
  bio: "Soy Álvaro, fotógrafo afincado en Córdoba. Fotografiar es mi forma de capturar y entender el mundo. Más de 50 países, una cámara y la mirada de quien sigue sorprendiéndose."
  github: ""
web_design: "Álvaro C. A."

social_urls:
  instagram: "https://www.instagram.com/nomadinpics"

# Configure which exif data to display
# Tag is the actual exif tag, icon is a fontawesome icon. Use JSON notation without line breaks
exif: '[{"tag": "Model", "icon": "fa fa-camera-retro"}, {"tag": "FNumber", "icon": "far fa-dot-circle"}, {"tag": "ExposureTime", "icon": "far fa-clock"}, {"tag": "ISOSpeedRatings", "icon": "fa fa-info-circle"}]'
